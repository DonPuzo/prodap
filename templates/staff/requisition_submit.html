{% extends "base.html" %}
{% block content %}
<h2>Submit Requisition: {{ requisition.title }}</h2>
{% if error %}<div class="message message-error">{{ error }}</div>{% endif %}
<div class="form-card">
  <form method="post">
    {% csrf_token %}
    <p>This confirms the requisition is ready for Finance to review fund availability.</p>
    <button class="btn" type="submit">Submit</button>
    <a class="btn btn-secondary" href="{% url 'staff_requisition_detail' requisition.id %}">Cancel</a>
  </form>
</div>
{% endblock %}
