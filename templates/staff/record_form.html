{% extends "base.html" %}
{% block content %}
<h2>{% if is_new %}New Procurement Record{% else %}Edit: {{ record.title }}{% endif %}</h2>
<div class="form-card">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Save</button>
    <a class="btn btn-secondary" href="{% url 'staff_record_list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
